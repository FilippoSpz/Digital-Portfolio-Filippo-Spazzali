<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#191f4c"/>
      <stop offset="100%" stop-color="#05060e"/>
    </radialGradient>
    <radialGradient id="planet" cx="36%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#c3b6ff"/>
      <stop offset="40%" stop-color="#7a63e6"/>
      <stop offset="78%" stop-color="#4230a3"/>
      <stop offset="100%" stop-color="#1c1450"/>
    </radialGradient>
    <radialGradient id="vol" cx="50%" cy="50%" r="62%" fx="34%" fy="28%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="80%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#8a7bff" stop-opacity="0"/>
      <stop offset="84%" stop-color="#8a7bff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8a7bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9fb6ff" stop-opacity="0.08"/>
      <stop offset="26%" stop-color="#cfe0ff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="74%" stop-color="#cfe0ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9fb6ff" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- stars -->
  <circle cx="12" cy="13" r="1" fill="#eaf0ff" opacity="0.9"/>
  <circle cx="53" cy="11" r="0.8" fill="#bcd0ff" opacity="0.8"/>
  <circle cx="52" cy="53" r="0.9" fill="#eaf0ff" opacity="0.75"/>
  <circle cx="14" cy="50" r="0.7" fill="#a9b8ff" opacity="0.7"/>
  <circle cx="45" cy="45" r="0.6" fill="#cfe0ff" opacity="0.6"/>

  <!-- atmosphere glow -->
  <circle cx="31" cy="31" r="21" fill="url(#glow)"/>

  <!-- ring: far half (behind the planet) -->
  <path d="M 8 34 A 26.5 8.6 -22 0 0 54 28" fill="none" stroke="url(#ring)" stroke-width="2.3" stroke-linecap="round" opacity="0.5"/>

  <!-- planet body -->
  <circle cx="31" cy="31" r="14.5" fill="url(#planet)"/>
  <circle cx="31" cy="31" r="14.5" fill="url(#vol)"/>
  <ellipse cx="25" cy="23.5" rx="4.3" ry="3.2" fill="#ffffff" opacity="0.32"/>

  <!-- ring: near half (in front of the planet) -->
  <path d="M 54 28 A 26.5 8.6 -22 0 1 8 34" fill="none" stroke="url(#ring)" stroke-width="2.6" stroke-linecap="round"/>
</svg>
